services:

  lavalink:
    image: fredboat/lavalink:latest
    container_name: niby-lavalink
    restart: unless-stopped
    environment:
      - _JAVA_OPTIONS=-Xmx1G
      - SERVER_PORT=2333
      - LAVALINK_SERVER_PASSWORD=yourpassword
      - LAVALINK_SERVER_SOURCES=spotify,youtube,soundcloud
    ports:
      - "2333:2333"
    volumes:
      - lavalink_data:/opt/Lavalink
    networks:
      - niby-network
    healthcheck:
      test: ["CMD", "echo", "Lavalink is running"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  mongo:
    image: mongo:7
    container_name: niby-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - niby-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: niby-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - niby-network

  niby-bot:
    image: niby-discord-bot:latest
    container_name: niby-discord-bot
    build:
      args:
        NODE_ENV: production
    environment:
      - "BOT_TOKEN=${BOT_TOKEN}"
      - "CLIENT_SECRET=${CLIENT_SECRET}"
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
      lavalink:
        condition: service_healthy
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    volumes:
      - niby_logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - niby-network
    security_opt:
      - no-new-privileges:true
    read_only: false
    tmpfs:
      - /tmp

volumes:
  redis_data:
    driver: local
  niby_logs:
    driver: local
  mongo_data:
    driver: local
  lavalink_data:
    driver: local

networks:
  niby-network:
    driver: bridge
